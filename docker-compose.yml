services:
  db:
    image: pgvector/pgvector:pg17
    container_name: postgres-vec
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=adm
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=postgres
    volumes:
      - .\db_data:/var/lib/postgresql/data
      # - .\scripts:/docker-entrypoint-initdb.d

  back:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      - REC_MODEL_PATH=/app/models/user_tower.onnx
      - EMBEDDING_DIM=384
      - ONNXRUNTIME_SHARED_LIBRARY_PATH=/usr/lib/onnxruntime/libonnxruntime.so
      - EVENTS_STORAGE_HOST=db
      - EVENTS_STORAGE_PORT=5432
      - EVENTS_STORAGE_USER=adm
      - EVENTS_STORAGE_PASSWORD=123
      - EVENTS_STORAGE_NAME=postgres
      - EVENTS_SERVER_PORT=8090
      - REDIS_PASSWORD=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - redis
      - db
    volumes:
      - ./models:/app/models:ro
    restart: always

  migrate:
    build:
      context: backend
      dockerfile: Dockerfile
    command: ["./main", "-mode=migrate"]
    environment:
      - EVENTS_STORAGE_HOST=${EVENTS_STORAGE_HOST:-db}
      - EVENTS_STORAGE_PORT=${EVENTS_STORAGE_PORT:-5432}
      - EVENTS_STORAGE_USER=${EVENTS_STORAGE_USER:-adm}
      - EVENTS_STORAGE_PASSWORD=${EVENTS_STORAGE_PASSWORD:-123}
      - EVENTS_STORAGE_NAME=${EVENTS_STORAGE_NAME:-postgres}
      - REDIS_PASSWORD=
    depends_on:
      - db

  nginx:
    image: nginx:1.29.8-alpine
    container_name: nginx_ddcs
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back

  redis:
    image: redis:7-alpine
    container_name: redis-black
    restart: on-failure
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  front:
    container_name: fronted_ddks
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "3000:3000" 
    environment:
      - VITE_API_URL=http://51.250.44.86:3000
    depends_on:
      - back

  embedder:
    build: ./embedder
    volumes:
      - ./models:/app/models
    environment:
      - DATABASE_URL=postgres://adm:123@db:5432/postgres?sslmode=disable
    depends_on:
      - db
    restart: "no"